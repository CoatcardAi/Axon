# Spring Boot Configuration
spring.application.name=axon

# Server Configuration
server.port=8080

# MongoDB Configuration
# Use SPRING_DATA_MONGODB_URI or embedded MongoDB by default.
# If no external MongoDB URI is provided, embedded MongoDB will be used.
spring.data.mongodb.uri=${SPRING_DATA_MONGODB_URI}
spring.data.mongodb.database=${SPRING_DATA_MONGODB_DATABASE:axon}
spring.mongodb.embedded.version=8.0.0

# Redis Configuration
spring.data.redis.url=${SPRING_DATA_REDIS_URL}

# JWT Configuration
# Hex-encoded 256-bit key for HMAC-SHA256
jwt.secret=${JWT_SECRET:9a4f2c8d3b7a1e5f8c6b4a2d0e7f9a1c3b5d7e9f2a4c6b8d0e2f4a6b8c0d2e4f}
# JWT expiration: 24 hours (in milliseconds)
jwt.expiration-ms=86400000

# Email / OTP Configuration
spring.mail.host=${SPRING_MAIL_HOST:smtp.gmail.com}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${SPRING_MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${SPRING_MAIL_SMTP_STARTTLS_ENABLE:true}
spring.mail.properties.mail.smtp.starttls.required=${SPRING_MAIL_SMTP_STARTTLS_REQUIRED:true}
spring.mail.properties.mail.smtp.connectiontimeout=${SPRING_MAIL_SMTP_CONNECTIONTIMEOUT:5000}
spring.mail.properties.mail.smtp.timeout=${SPRING_MAIL_SMTP_TIMEOUT:5000}
spring.mail.properties.mail.smtp.writetimeout=${SPRING_MAIL_SMTP_WRITETIMEOUT:5000}

# Spring Jackson/Serialization
spring.jackson.default-property-inclusion=non_null

# Enable logging details if needed
logging.level.com.coatcard.axon=INFO
logging.level.org.springframework.data.mongodb=INFO
logging.level.org.springframework.data.redis=INFO
